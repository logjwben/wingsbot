name: Wings Twitter → Bluesky Mirror

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Set up job
        run: echo "Starting mirror job..."

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 httpx yt-dlp

      - name: Run mirror bot
        env:
          RSS_FEED_URL: ${{ secrets.RSS_FEED_URL }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: |
          echo "Running bot..."
          python bot.py

      - name: Save state (seen_ids.json)
        run: |
          git config user.name "wings-mirror-bot"
          git config user.email "actions@github.com"
          git pull

          if [ -f seen_ids.json ]; then
            git add seen_ids.json
            git commit -m "chore: update seen_ids [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "seen_ids.json does not exist yet — skipping commit"
          fi
