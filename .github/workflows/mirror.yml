name: Wings Twitter → Bluesky Mirror

on:
  schedule:
    # Runs every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:   # lets you trigger it manually from GitHub UI

jobs:
  mirror:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit seen_ids.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Run mirror bot
        env:
          RSS_FEED_URL:       ${{ secrets.RSS_FEED_URL }}
          BSKY_HANDLE:        ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD:  ${{ secrets.BSKY_APP_PASSWORD }}
        run: python bot.py

      - name: Save state (seen_ids.json)
        run: |
          git config user.name  "wings-mirror-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen_ids.json
          git diff --cached --quiet || git commit -m "chore: update seen_ids [skip ci]"
          git push
