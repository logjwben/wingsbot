name: Wings Twitter → Bluesky Mirror

on:
  schedule:
    - cron: "*/30 * * * *"   # Runs every 30 minutes (UTC)
  workflow_dispatch:          # Allows manual runs

jobs:
  mirror:
    runs-on: ubuntu-latest

    permissions:
      contents: write         # Needed to commit seen_ids.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # Full history so pull/rebase works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 atproto

      - name: Run mirror bot
        env:
          RSS_FEED_URL:       ${{ secrets.RSS_FEED_URL }}
          BSKY_HANDLE:        ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD:  ${{ secrets.BSKY_APP_PASSWORD }}
        run: |
          echo "Running bot..."
          python bot.py || (echo "Bot crashed" && exit 1)

      - name: Save state (seen_ids.json)
        run: |
          git config user.name  "wings-mirror-bot"
          git config user.email "bot@users.noreply.github.com"

          # Pull latest changes BEFORE committing
          git pull --rebase --autostash origin main

          git add seen_ids.json

          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: update seen_ids [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
